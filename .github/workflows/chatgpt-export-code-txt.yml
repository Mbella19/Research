name: Export code as TXT

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Convert code files to TXT
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import shutil, zipfile
          from pathlib import Path
          root = Path.cwd()
          out = root / "Research_code_as_txt"
          archive = root / "Research_code_as_txt.zip"
          if out.exists(): shutil.rmtree(out)
          if archive.exists(): archive.unlink()
          out.mkdir(parents=True)
          dirs = {"src", "tests", "scripts", "bridge", "config"}
          roots = {".gitignore", ".gitattributes", "Makefile", "Dockerfile", "README.md", "pyproject.toml", "requirements.txt", "Chart pattern.txt", "MS.txt"}
          suffixes = {".py", ".pyi", ".sh", ".bash", ".zsh", ".fish", ".ps1", ".bat", ".cmd", ".js", ".jsx", ".ts", ".tsx", ".java", ".c", ".h", ".cpp", ".cc", ".cxx", ".hpp", ".cs", ".go", ".rs", ".rb", ".php", ".swift", ".kt", ".kts", ".scala", ".r", ".sql", ".html", ".htm", ".css", ".scss", ".sass", ".less", ".vue", ".svelte", ".pine", ".pinescript", ".toml", ".yaml", ".yml", ".json", ".ini", ".cfg", ".conf", ".md", ".txt"}
          chosen = []
          for p in root.rglob("*"):
              if not p.is_file(): continue
              rel = p.relative_to(root)
              if rel.parts[0] in {".git", ".github", "Research_code_as_txt"}: continue
              if not (rel.parts[0] in dirs or (len(rel.parts) == 1 and p.name in roots)): continue
              if p.suffix.lower() not in suffixes and p.name not in roots: continue
              chosen.append(p)
          manifest = ["Research repository code converted to TXT", "Original folder structure is preserved.", ""]
          converted = skipped = 0
          for src in sorted(chosen):
              rel = src.relative_to(root)
              raw = src.read_bytes()
              if b"\x00" in raw:
                  manifest.append(f"SKIPPED BINARY: {rel.as_posix()}")
                  skipped += 1
                  continue
              try: text = raw.decode("utf-8-sig")
              except UnicodeDecodeError: text = raw.decode("cp1252", errors="replace")
              target_rel = rel if src.suffix.lower() == ".txt" else rel.with_name(rel.name + ".txt")
              target = out / target_rel
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(text, encoding="utf-8", newline="")
              manifest.append(f"{rel.as_posix()} -> {target_rel.as_posix()}")
              converted += 1
          manifest += ["", f"Converted files: {converted}", f"Skipped binary files: {skipped}"]
          (out / "MANIFEST.txt").write_text("\n".join(manifest) + "\n", encoding="utf-8")
          with zipfile.ZipFile(archive, "w", zipfile.ZIP_DEFLATED) as z:
              for p in sorted(out.rglob("*")):
                  if p.is_file(): z.write(p, p.relative_to(root))
          print(f"Created {archive.name}: {converted} files converted, {skipped} skipped")
          PY
      - name: Upload TXT ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Research-code-as-txt
          path: Research_code_as_txt.zip
          if-no-files-found: error
          retention-days: 1
