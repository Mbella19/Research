name: Export code as TXT

on:
  push:
    branches: [chatgpt-code-txt-export]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Convert code files to TXT
        shell: bash
        run: |
          python - <<'PY'
          from __future__ import annotations
          import shutil
          import zipfile
          from pathlib import Path

          root = Path.cwd()
          export_root = root / "Research_code_as_txt"
          zip_path = root / "Research_code_as_txt.zip"
          if export_root.exists():
              shutil.rmtree(export_root)
          if zip_path.exists():
              zip_path.unlink()
          export_root.mkdir(parents=True)

          included_directories = {"src", "tests", "scripts", "bridge", "config"}
          included_root_files = {
              ".gitignore", ".gitattributes", "Makefile", "Dockerfile",
              "README.md", "pyproject.toml", "requirements.txt",
              "Chart pattern.txt", "MS.txt",
          }
          code_suffixes = {
              ".py", ".pyi", ".sh", ".bash", ".zsh", ".fish", ".ps1",
              ".bat", ".cmd", ".js", ".jsx", ".ts", ".tsx", ".java",
              ".c", ".h", ".cpp", ".cc", ".cxx", ".hpp", ".cs", ".go",
              ".rs", ".rb", ".php", ".swift", ".kt", ".kts", ".scala",
              ".r", ".sql", ".html", ".htm", ".css", ".scss", ".sass",
              ".less", ".vue", ".svelte", ".pine", ".pinescript", ".toml",
              ".yaml", ".yml", ".json", ".ini", ".cfg", ".conf", ".md", ".txt",
          }

          selected = []
          for path in root.rglob("*"):
              if not path.is_file():
                  continue
              rel = path.relative_to(root)
              if rel.parts[0] in {".git", "Research_code_as_txt"}:
                  continue
              if rel.as_posix() == ".github/workflows/chatgpt-export-code-txt.yml":
                  continue
              in_dir = rel.parts[0] in included_directories
              at_root = len(rel.parts) == 1 and path.name in included_root_files
              if not (in_dir or at_root):
                  continue
              if path.suffix.lower() not in code_suffixes and path.name not in included_root_files:
                  continue
              selected.append(path)

          manifest = [
              "Research repository code converted to TXT",
              "Original folder structure is preserved.",
              "",
          ]
          converted = skipped = 0
          for source in sorted(selected):
              rel = source.relative_to(root)
              raw = source.read_bytes()
              if b"\x00" in raw:
                  manifest.append(f"SKIPPED BINARY: {rel.as_posix()}")
                  skipped += 1
                  continue
              try:
                  text = raw.decode("utf-8-sig")
              except UnicodeDecodeError:
                  text = raw.decode("cp1252", errors="replace")
              output_rel = rel if source.suffix.lower() == ".txt" else rel.with_name(rel.name + ".txt")
              destination = export_root / output_rel
              destination.parent.mkdir(parents=True, exist_ok=True)
              destination.write_text(text, encoding="utf-8", newline="")
              manifest.append(f"{rel.as_posix()} -> {output_rel.as_posix()}")
              converted += 1

          manifest += ["", f"Converted files: {converted}", f"Skipped binary files: {skipped}"]
          (export_root / "MANIFEST.txt").write_text("\n".join(manifest) + "\n", encoding="utf-8")
          with zipfile.ZipFile(zip_path, "w", compression=zipfile.ZIP_DEFLATED) as zf:
              for path in sorted(export_root.rglob("*")):
                  if path.is_file():
                      zf.write(path, path.relative_to(root))
          print(f"Created {zip_path.name} with {converted} converted files.")
          PY

      - name: Upload TXT ZIP
        uses: actions/upload-artifact@v4
        with:
          name: Research-code-as-txt
          path: Research_code_as_txt.zip
          if-no-files-found: error
          retention-days: 1
