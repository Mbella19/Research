# ── Instrument definition ─────────────────────────────────────────────
# To retrain on another instrument: copy the project, swap the CSVs,
# and edit THIS file (plus experiment.yaml knobs if desired). Nothing else.
symbol: NAS100

# One MT5 "point" (the unit of the SPREAD column) in price units.
point_size: 0.1
digits: 1

# Account-currency value of a 1.0 price-unit move per 1.0 lot.
value_per_price_unit_per_lot: 1.0
min_lot: 0.01
lot_step: 0.01
max_lot: 50.0

session:
  weekdays: [0, 1, 2, 3, 4]   # Monday=0 .. Friday=4 (broker time)
  day_start: "01:00"          # first 1m bar of the trading day
  day_end: "23:59"            # last minute before the maintenance gap
  no_entry_after: "22:45"     # new entries blocked after this time
  force_flat_at: "23:30"      # open positions are closed at this bar

data:
  format: mt5_tsv             # <DATE> <TIME> <OPEN> <HIGH> <LOW> <CLOSE> <TICKVOL> <VOL> <SPREAD>
  base_timeframe_minutes: 1
  real:
    training: "NAS100 DATA/NAS100 TRAINING.csv"
    validation: "NAS100 DATA/NAS100 VALIDATION.csv"
    locked_oos: "NAS100 DATA/NAS100 LOCKED OOS.csv"   # SINGLE-SHOT: only `daytrader oos` may consume this
  synthetic:
    glob: "SYNTHETIC DATA/*.csv"

# Physical cost baseline (stress multipliers are experiment knobs).
# All-in round trip ≈ stressed spread (1.6 pt) + 2×slippage (1.0 pt) +
# commission (1.0 pt) ≈ 3.6 index points ≈ 2× a realistic retail cost.
costs:
  spread_source: column               # per-bar SPREAD column (points)
  spread_floor_points: 10.0           # never assume tighter than this
  commission_per_lot_per_side: 0.5    # account-$ per lot per side
  slippage_points: 5.0                # baseline per fill (0.5 index pts)
